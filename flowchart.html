<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电解锰渣处理工艺流程图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    display: grid;
    grid-template-columns: 260px 1fr 260px;
    height: 100vh;
    background: #eef2e9;
    overflow: hidden;
  }
  .panel {
    background: #f7faf5;
    border-right: 1px solid #c8d4b8;
    padding: 18px;
    overflow-y: auto;
  }
  .panel:last-child {
    border-right: none;
    border-left: 1px solid #c8d4b8;
  }
  h2 { font-size: 16px; color: #3a5a40; margin-bottom: 12px; }
  p { font-size: 13px; color: #555; line-height: 1.8; margin-bottom: 8px; }
  .legend { margin-top: 18px; }
  .legend-item { display: flex; align-items: center; font-size: 12px; margin: 8px 0; }
  .legend-box { width: 28px; height: 14px; margin-right: 8px; border-radius: 2px; }
  .main { display: flex; flex-direction: column; position: relative; }
  canvas { flex: 1; background: #f7faf5; cursor: crosshair; }
  .toolbar {
    position: absolute; top: 12px; left: 12px;
    display: flex; gap: 8px;
  }
  button {
    padding: 6px 12px; font-size: 12px;
    border: 1px solid #a8b898; background: #fff; border-radius: 4px; cursor: pointer;
    color: #3a5a40;
  }
  button:hover { background: #e8eee0; }
  #propPanel p { margin-bottom: 6px; }
  #propPanel .label { color: #777; }
  #propPanel .value { color: #2a4a30; font-weight: 500; }
  .param-row { display: flex; align-items: center; gap: 6px; margin: 8px 0; font-size: 13px; }
  .param-row label { width: 50px; white-space: nowrap; color: #555; text-align: right; }
  .param-row input {
    width: 70px; padding: 3px 6px; border: 1px solid #c8d4b8; border-radius: 4px;
    font-size: 13px; color: #333;
  }
  .param-row .unit { color: #777; font-size: 12px; width: 22px; text-align: left; }
  .save-btn {
    margin-top: 10px; padding: 5px 14px; font-size: 12px;
    background: #5b8cc4; color: #fff; border: none; border-radius: 4px; cursor: pointer;
  }
  .save-btn:hover { background: #4a7bb0; }
  .ro-value {
    display: inline-block; width: 70px; padding: 3px 6px; background: #f0f3ec;
    border: 1px solid #c8d4b8; border-radius: 4px; font-size: 13px; color: #333;
    text-align: right;
  }
  .formula { color: #888; font-size: 11px; margin-left: 4px; }
  .calc-status {
    margin-top: 12px; padding: 8px 12px; background: #fff; border: 1px solid #c8d4b8;
    border-radius: 4px; font-size: 12px; color: #3a5a40; min-height: 20px;
  }
  .empty { color: #888; font-size: 13px; text-align: center; margin-top: 40px; }
</style>
</head>
<body>
  <div class="panel">
    <h2>工艺描述</h2>
    <p><strong>原料：</strong>原渣（含锰固废）</p>
    <p><strong>资源化工段：</strong>原渣 → 资源化化浆 → 进料 → 洗涤 → 压榨吹扫。洗涤/压榨水汇入中转桶循环回用。</p>
    <p><strong>无害化工段：</strong>压榨吹扫后渣进入无害化化浆 → 进料 → 洗涤 → 压榨吹扫 → 最终出渣。洗涤水经洗涤中转、中和回用；吹脱后浆液经沉淀返回无害化化浆。</p>
    <p><strong>锰回收系统：</strong>中转桶出水沉锰产出锰盐。</p>
    <p><strong>氨回收系统：</strong>沉锰后液依次碱化、蒸氨、中和，蒸氨渣返回吹脱。</p>
    <div class="legend">
      <h2>图例</h2>
      <div class="legend-item"><div class="legend-box" style="background:#5b8cc4"></div>主工艺/容器节点</div>
      <div class="legend-item"><div class="legend-box" style="background:#e0b06b"></div>渣/预处理输送</div>
      <div class="legend-item"><div class="legend-box" style="background:#45a36c"></div>回用水线</div>
      <div class="legend-item"><div class="legend-box" style="background:#e6b800"></div>氨回收支线</div>
      <div class="legend-item"><div class="legend-box" style="background:#40bfbf"></div>水处理线</div>
      <div class="legend-item"><div class="legend-box" style="background:#d9a6e0"></div>药剂反应线</div>
      <div class="legend-item"><div class="legend-box" style="background:#fff;border:2px solid #e6a23c"></div>产品</div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button onclick="resetView()">重置视图</button>
      <button onclick="toggleLabels()">切换标签</button>
      <button onclick="toggleFlow()" id="flowBtn">暂停流动</button>
      <button onclick="runCalc()">计算</button>
    </div>
    <canvas id="flowCanvas"></canvas>
  </div>

  <div class="panel" id="propPanel">
    <h2>属性</h2>
    <div id="calcStatus" class="calc-status" style="display:none"></div>
    <div class="empty">点击 Canvas 中的节点或连线查看属性</div>
  </div>

<script>
const canvas = document.getElementById('flowCanvas');
const ctx = canvas.getContext('2d');
let showLabels = true;
let flowEnabled = true;
let flowOffset = 0;
let scale = 1, offsetX = 0, offsetY = 0;

const styles = {
  solid:  { fill: '#5b8cc4', stroke: '#3a6ea5', text: '#fff' },
  tank:   { fill: '#6a9bd3', stroke: '#3a6ea5', text: '#fff' },
  reagent:{ fill: '#9f7cc4', stroke: '#6a4c9c', text: '#fff' },
  product:{ fill: '#fff8e6', stroke: '#e6a23c', text: '#b87a00' }
};

// 分区背景矩形（逻辑坐标）
const zones = [
  { x: 30, y: 10, w: 580, h: 210, label: '锰回收系统', color: 'rgba(159,124,196,0.12)' },
  { x: 620, y: 10, w: 780, h: 210, label: '氨回收系统', color: 'rgba(64,191,191,0.12)' },
  { x: 30, y: 250, w: 760, h: 150, label: '资源化工段', color: 'rgba(224,176,107,0.14)' },
  { x: 800, y: 400, w: 760, h: 150, label: '无害化工段', color: 'rgba(91,140,196,0.12)' }
];

const nodes = [
  { id: 'L', text: '中转桶',       type: 'tank',   x: 520, y: 150, w: 110, h: 55 },
  { id: 'M', text: '吹脱',         type: 'tank',   x: 1040, y: 150, w: 80, h: 55 },
  { id: 'T', text: '沉淀',         type: 'tank',   x: 860, y: 150, w: 80, h: 55 },

  { id: 'S', text: '锰盐',         type: 'product', x: 360, y:  45, w: 90, h: 50 },
  { id: 'N', text: '沉锰',         type: 'reagent', x: 520, y:  45, w: 80, h: 50 },
  { id: 'O', text: '碱化',         type: 'reagent', x: 760, y:  45, w: 80, h: 50 },
  { id: 'P', text: '蒸氨',         type: 'reagent', x: 1040, y: 45, w: 80, h: 50 },
  { id: 'Q', text: '中和',         type: 'reagent', x: 1200, y: 45, w: 80, h: 50 },

  { id: 'A', text: '原渣',         type: 'solid',  x:  80, y: 330, w: 100, h: 55 },
  { id: 'C', text: '资源化化浆',   type: 'tank',   x: 220, y: 330, w: 120, h: 55 },
  { id: 'D', text: '一进料',       type: 'solid',  x: 380, y: 330, w: 80, h: 50 },
  { id: 'E', text: '一洗涤',       type: 'solid',  x: 520, y: 330, w: 80, h: 50 },
  { id: 'F', text: '一压榨吹扫',   type: 'solid',  x: 680, y: 330, w: 100, h: 55 },

  { id: 'G', text: '无害化化浆',   type: 'tank',   x: 880, y: 470, w: 110, h: 55 },
  { id: 'H', text: '二进料',       type: 'solid',  x: 1060, y: 470, w: 80, h: 50 },
  { id: 'I', text: '二洗涤',       type: 'solid',  x: 1220, y: 470, w: 80, h: 50 },
  { id: 'J', text: '二压榨吹扫',   type: 'solid',  x: 1380, y: 470, w: 100, h: 55 },

  { id: 'K', text: '出渣',         type: 'solid',  x: 1640, y: 470, w: 80, h: 50 },

  { id: 'R', text: '洗涤中转',     type: 'tank',   x: 1220, y: 590, w: 110, h: 55 }
];

const links = [
  { from: 'A', to: 'C', label: '',     style: 'slag' },
  { from: 'C', to: 'D', label: '',     style: 'slag' },
  { from: 'D', to: 'E', label: '渣',   style: 'slag' },
  { from: 'E', to: 'F', label: '渣',   style: 'slag' },
  { from: 'F', to: 'G', label: '渣',   style: 'slag',    way: [[760, 330], [760, 470]] },
  { from: 'G', to: 'H', label: '',     style: 'slag' },
  { from: 'H', to: 'I', label: '渣',   style: 'slag' },
  { from: 'I', to: 'J', label: '渣',   style: 'slag' },
  { from: 'J', to: 'K', label: '渣',   style: 'slag' },

  { from: 'D', to: 'L', label: '水',   style: 'recycle', way: [[380, 150]] },
  { from: 'E', to: 'L', label: '水',   style: 'recycle' },
  { from: 'F', to: 'L', label: '水',   style: 'recycle', way: [[680, 150]] },
  { from: 'L', to: 'C', label: '水',   style: 'water',   way: [[220, 150]] },

  { from: 'H', to: 'M', label: '',     style: 'recycle', way: [[1060, 150]] },
  { from: 'J', to: 'M', label: '水',   style: 'recycle', way: [[1380, 150]] },
  { from: 'M', to: 'T', label: '浆',   style: 'yellow' },
  { from: 'T', to: 'G', label: '水',   style: 'yellow',  way: [[860, 470]] },

  { from: 'I', to: 'R', label: '去中转',   style: 'recycle' },
  { from: 'Q', to: 'I', label: '去二洗涤', style: 'water',   way: [[1200, 470]] },
  { from: 'R', to: 'E', label: '回水',     style: 'water',   way: [[520, 590]] },

  { from: 'L', to: 'N', label: '',     style: 'reagent' },
  { from: 'N', to: 'O', label: '',     style: 'reagent' },
  { from: 'O', to: 'P', label: '',     style: 'reagent' },
  { from: 'P', to: 'Q', label: '',     style: 'reagent' },
  { from: 'P', to: 'M', label: '渣',   style: 'yellow' },
  { from: 'N', to: 'S', label: '',     style: 'product' }
];

function nodeById(id) { return nodes.find(n => n.id === id); }

function nodeRect(n) {
  return {
    x: offsetX + (n.x - n.w/2) * scale,
    y: offsetY + (n.y - n.h/2) * scale,
    w: n.w * scale,
    h: n.h * scale,
    cx: offsetX + n.x * scale,
    cy: offsetY + n.y * scale
  };
}

function edgePoint(n, dx, dy) {
  const halfW = n.w / 2, halfH = n.h / 2;
  if (dx === 0 && dy === 0) return { x: offsetX + n.x * scale, y: offsetY + n.y * scale };
  const tx = dx > 0 ? halfW / dx : dx < 0 ? -halfW / dx : Infinity;
  const ty = dy > 0 ? halfH / dy : dy < 0 ? -halfH / dy : Infinity;
  const t = Math.min(tx, ty);
  return { x: offsetX + (n.x + dx * t) * scale, y: offsetY + (n.y + dy * t) * scale };
}

function toCanvas(p) { return { x: offsetX + p[0] * scale, y: offsetY + p[1] * scale }; }

function linkPoints(l) {
  const a = nodeById(l.from), b = nodeById(l.to);
  const way = (l.way || []).map(toCanvas);
  const pts = [];
  const first = way.length ? way[0] : toCanvas([b.x, b.y]);
  pts.push(edgePoint(a, first.x - (offsetX + a.x * scale), first.y - (offsetY + a.y * scale)));
  way.forEach(p => pts.push(p));
  const last = way.length ? way[way.length - 1] : pts[0];
  pts.push(edgePoint(b, last.x - (offsetX + b.x * scale), last.y - (offsetY + b.y * scale)));
  return pts;
}

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  const bbox = { minX: 20, maxX: 1700, minY: 10, maxY: 660 };
  scale = Math.min(rect.width / (bbox.maxX - bbox.minX + 120), rect.height / (bbox.maxY - bbox.minY + 80));
  offsetX = (rect.width - (bbox.maxX - bbox.minX) * scale) / 2 - bbox.minX * scale;
  offsetY = (rect.height - (bbox.maxY - bbox.minY) * scale) / 2 - bbox.minY * scale;
  draw();
}

function drawZones() {
  zones.forEach(z => {
    const x = offsetX + z.x * scale, y = offsetY + z.y * scale;
    const w = z.w * scale, h = z.h * scale;
    ctx.save();
    ctx.fillStyle = z.color;
    ctx.strokeStyle = 'rgba(80,100,60,0.25)';
    ctx.lineWidth = 1.5 * scale;
    ctx.setLineDash([6 * scale, 4 * scale]);
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 12 * scale);
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#5a7a4a';
    ctx.font = `bold ${Math.max(14 * scale, 11)}px "Microsoft YaHei"`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(z.label, x + 10 * scale, y + 8 * scale);
    ctx.restore();
  });
}

function drawNode(n) {
  ctx.save();
  const r = nodeRect(n);
  const s = styles[n.type];

  // 阴影
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 6 * scale;
  ctx.shadowOffsetY = 3 * scale;

  // 渐变填充
  const grad = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
  grad.addColorStop(0, s.fill);
  grad.addColorStop(1, lighten(s.fill, 0.15));
  ctx.fillStyle = grad;
  ctx.strokeStyle = s.stroke;
  ctx.lineWidth = 2 * scale;
  const radius = Math.min(12 * scale, r.w / 2);
  ctx.beginPath();
  ctx.roundRect(r.x, r.y, r.w, r.h, radius);
  ctx.fill();
  ctx.stroke();

  ctx.shadowColor = 'transparent';

  // 横排文字
  ctx.fillStyle = s.text;
  ctx.font = `bold ${Math.max(12 * scale, 10)}px "Microsoft YaHei"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.text, r.cx, r.cy);
  ctx.restore();
}

function lighten(hex, amt) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, Math.round((num >> 16) + (255 - (num >> 16)) * amt));
  const g = Math.min(255, Math.round(((num >> 8) & 0x00FF) + (255 - ((num >> 8) & 0x00FF)) * amt));
  const b = Math.min(255, Math.round((num & 0x0000FF) + (255 - (num & 0x0000FF)) * amt));
  return `rgb(${r},${g},${b})`;
}

function pipeColors(style) {
  if (style === 'slag')    return { main: '#d33', flow: '#ff9999', width: 4 };
  if (style === 'water')   return { main: '#40bfbf', flow: '#a6f0f0', width: 3 };
  if (style === 'recycle') return { main: '#45a36c', flow: '#9fe6b8', width: 3 };
  if (style === 'yellow')  return { main: '#e6b800', flow: '#fff099', width: 3 };
  if (style === 'reagent') return { main: '#9f7cc4', flow: '#e6d0f5', width: 3 };
  return { main: '#e6a23c', flow: '#ffe6b3', width: 3 };
}

function drawArrowSegment(p1, p2, style) {
  const c = pipeColors(style);
  const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
  const len = Math.hypot(p2.x - p1.x, p2.y - p1.y);
  if (len < 0.5) return { angle, len };

  ctx.save();
  ctx.translate(p1.x, p1.y);
  ctx.rotate(angle);

  // 阴影
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 4 * scale;
  ctx.shadowOffsetY = 2 * scale;

  // 主线
  ctx.strokeStyle = c.main;
  ctx.lineWidth = c.width * scale;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(len, 0);
  ctx.stroke();

  ctx.shadowColor = 'transparent';

  // 流动高亮
  if (flowEnabled) {
    ctx.strokeStyle = c.flow;
    ctx.lineWidth = Math.max(1.5 * scale, 1);
    const dash = [8 * scale, 10 * scale];
    ctx.setLineDash(dash);
    ctx.lineDashOffset = -flowOffset;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(len, 0);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
  return { angle, len };
}

function drawFlowLine(path, style, label) {
  if (path.length < 2) return;
  const c = pipeColors(style);

  for (let i = 0; i < path.length - 1; i++) drawArrowSegment(path[i], path[i + 1], style);

  // 末端箭头
  const p1 = path[path.length - 2], p2 = path[path.length - 1];
  const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
  const headLen = 12 * scale;
  ctx.save();
  ctx.fillStyle = c.main;
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 4 * scale;
  ctx.shadowOffsetY = 2 * scale;
  ctx.beginPath();
  ctx.moveTo(p2.x, p2.y);
  ctx.lineTo(p2.x - headLen * Math.cos(angle - Math.PI/6), p2.y - headLen * Math.sin(angle - Math.PI/6));
  ctx.lineTo(p2.x - headLen * Math.cos(angle + Math.PI/6), p2.y - headLen * Math.sin(angle + Math.PI/6));
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 标签
  if (showLabels && label) {
    let best = { i: 0, len: 0 };
    for (let i = 0; i < path.length - 1; i++) {
      const len = Math.hypot(path[i+1].x - path[i].x, path[i+1].y - path[i].y);
      if (len > best.len) best = { i, len };
    }
    const a = path[best.i], b = path[best.i + 1];
    const nx = (b.y - a.y) / best.len;
    const ny = -(b.x - a.x) / best.len;
    ctx.save();
    ctx.fillStyle = c.main;
    ctx.font = `bold ${Math.max(11 * scale, 10)}px "Microsoft YaHei"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const mx = (a.x + b.x) / 2 + nx * (8 * scale);
    const my = (a.y + b.y) / 2 + ny * (8 * scale);
    ctx.fillText(label, mx, my);
    ctx.restore();
  }
}

function draw() {
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  drawZones();
  links.forEach(l => drawFlowLine(linkPoints(l), l.style, l.label));
  nodes.forEach(drawNode);
}

function animate() {
  if (flowEnabled) {
    flowOffset += 1.5 * scale;
    draw();
  }
  requestAnimationFrame(animate);
}

function hitTestNode(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const r = nodeRect(nodes[i]);
    if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) return nodes[i];
  }
  return null;
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1, len2 = dx*dx + dy*dy;
  const t = len2 === 0 ? 0 : Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / len2));
  return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
}

function distToPolyline(px, py, pts) {
  let best = Infinity;
  for (let i = 0; i < pts.length - 1; i++) {
    best = Math.min(best, distToSegment(px, py, pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y));
  }
  return best;
}

function hitTestLink(mx, my) {
  let best = null, bestD = 10 * scale;
  links.forEach(l => {
    const d = distToPolyline(mx, my, linkPoints(l));
    if (d < bestD) { bestD = d; best = l; }
  });
  return best;
}

function getNodeIO(id) {
  const nc = calcResults[id] || notCalculated();
  const p = nodeById(id).params || {};
  const z = { water: 0, slag: 0, mn: 0, nh3n: 0, mg: 0 };

  function fromObj(obj) {
    const total = n(obj.total);
    return {
      water: n(obj.waterAbs || (total * n(obj.water) / 100)),
      slag: n(obj.dryWeight || obj.stayDry || 0),
      mn: total * n(obj.mn) / 100,
      nh3n: total * n(obj.nh3n) / 100,
      mg: total * n(obj.mg) / 100
    };
  }

  switch (id) {
    case 'A': {
      const total = n(p.total);
      const water = total * n(p.water) / 100;
      const dry = total - water;
      return { in: null, out: { water, slag: dry, mn: total * n(p.mn) / 100, nh3n: total * n(p.nh3n) / 100, mg: total * n(p.mg) / 100 } };
    }
    case 'C': {
      const a = calcResults['A'] || notCalculated();
      const aTotal = n(a.total || p.total);
      const aWater = aTotal * n(a.water || p.water) / 100;
      const aDry = aTotal - aWater;

function formatIO(io, titleIn = '进入', titleOut = '混合后 / 出') {
  const rows = (obj, detail) => {
    const base = `
      <div class="param-row"><label>水</label><span class="ro-value">${obj.water.toFixed(3)}</span><span class="unit">kg</span></div>
      <div class="param-row"><label>渣</label><span class="ro-value">${obj.slag.toFixed(3)}</span><span class="unit">kg</span></div>
      <div class="param-row"><label>锰</label><span class="ro-value">${obj.mn.toFixed(3)}</span><span class="unit">kg</span></div>
      <div class="param-row"><label>氨氮</label><span class="ro-value">${obj.nh3n.toFixed(3)}</span><span class="unit">kg</span></div>
      <div class="param-row"><label>镁</label><span class="ro-value">${obj.mg.toFixed(3)}</span><span class="unit">kg</span></div>
    `;
    return detail ? detail : base;
  };
  const inHtml = io.in ? `
    <hr style="margin:14px 0;border-color:#ddd">
    <h3 style="font-size:14px;color:#3a5a40;margin-bottom:10px">${titleIn}</h3>
    ${rows(io.in, io.in.inDetail)}
  ` : '';
  const outHtml = io.out ? `
    <hr style="margin:14px 0;border-color:#ddd">
    <h3 style="font-size:14px;color:#3a5a40;margin-bottom:10px">${titleOut}</h3>
    ${rows(io.out, io.out.outDetail)}
  ` : '';
  return inHtml + outHtml;
}

function buildParamsHtml(id) {
  const p = nodeById(id).params || {};
  const fields = [];
  if (id === 'A') {
    fields.push(['总重', 'p-total', p.total ?? 1333.33, 'kg'], ['含水率', 'p-water', p.water ?? 25, '%'], ['锰', 'p-mn', p.mn ?? 1, '%'], ['氨氮', 'p-nh3n', p.nh3n ?? 0.5, '%'], ['镁', 'p-mg', p.mg ?? 1.05, '%']);
  } else if (id === 'C' || id === 'G') {
    fields.push(['渣水比', 'p-slagWaterRatio', p.slagWaterRatio ?? 3, '水:渣']);
  } else if (id === 'L') {
    fields.push(['去沉锰水量', 'p-toN', p.toN ?? 500, 'kg']);
  } else if (id === 'N') {
    fields.push(['出水锰', 'p-outMn', p.outMn ?? 200, 'mg/L']);
  } else if (id === 'O') {
    fields.push(['目标pH', 'p-ph', p.ph ?? 12, '-']);
  } else if (id === 'P') {
    fields.push(['蒸氨后氨氮', 'p-outNh3n', p.outNh3n ?? 50, 'mg/L']);
  } else if (id === 'Q') {
    fields.push(['目标pH', 'p-ph', p.ph ?? 8, '-']);
  } else if (id === 'T') {
    fields.push(['镁去除比例', 'p-mgRemoval', p.mgRemoval ?? 20, '%']);
  } else if (id === 'M') {
    fields.push(['吹脱率', 'p-blowRate', p.blowRate ?? 20, '%'], ['吹脱后氨氮', 'p-blowOutNh3n', p.outNh3n ?? 0, 'mg/L']);
  } else if (id === 'D' || id === 'H') {
    fields.push(['渣饼含水', 'p-slagWater', p.slagWater ?? 500, 'kg']);
  } else if (id === 'E' || id === 'I') {
    fields.push(['洗涤效率', 'p-washEff', p.washEff ?? 85, '%'], ['洗涤后渣含水', 'p-washSlagWater', p.washSlagWater ?? 333.33, 'kg']);
  } else if (id === 'F' || id === 'J') {
    fields.push(['出渣含水率', 'p-outSlagWater', p.outSlagWater ?? 25, '%']);
  }
  if (fields.length === 0) return '';
  const rows = fields.map(([label, id2, val, unit]) => `<div class="param-row"><label>${label}</label><input type="number" id="${id2}" value="${val}"><span class="unit">${unit}</span></div>`).join('');
  return `
    <hr style="margin:14px 0;border-color:#ddd">
    <h3 style="font-size:14px;color:#3a5a40;margin-bottom:10px">输入参数</h3>
    ${rows}
    <button class="save-btn" onclick="saveParams('${id}')">保存参数</button>
  `;
}

let calcCache = {};
let calcResults = {};
let lastCalcRound = 0;

function clearCalcCache() { calcCache = {}; }
function cached(key, fn) {
  if (calcCache[key]) return calcCache[key];
  const r = fn();
  calcCache[key] = r;
  return r;
}

function notCalculated() {
  return { water: 0, mn: 0, nh3n: 0, mg: 0, total: 0, waterAbs: 0, dryWeight: 0, stayTotal:0, stayWater:0, stayDry:0, toL:{ water:0, mn:0, nh3n:0, mg:0 } };
}
function n(v) { return isNaN(v) || v == null ? 0 : Number(v); }

function calcC() {
  return cached('C', () => {
  const a = nodeById('A').params || { total: 1333.33, water: 25, mn: 1, nh3n: 0.5, mg: 1.4 };
  const cp = nodeById('C').params || { slagWaterRatio: 3 };
  const lp = nodeById('L').params || { toN: 500 };
  const fromLRaw = lp.backToC || { water: 0, mn: 0, nh3n: 0, mg: 0 };
  const fromL = { water: n(fromLRaw.water), mn: n(fromLRaw.mn), nh3n: n(fromLRaw.nh3n), mg: n(fromLRaw.mg) };
  const aTotal = n(a.total);
  const aWaterAbs = aTotal * n(a.water) / 100;
  const dryWeight = aTotal - aWaterAbs;
  const ratio = Number(cp.slagWaterRatio) || 3;
  const waterAbs = dryWeight * ratio;
  const total = dryWeight + waterAbs;
  const water = total > 0 ? waterAbs / total * 100 : 0;
  const mn = total > 0 ? (aTotal * n(a.mn) / 100 + fromL.mn) / total * 100 : 0;
  const nh3n = total > 0 ? (aTotal * n(a.nh3n) / 100 + fromL.nh3n) / total * 100 : 0;
  const mg = total > 0 ? (aTotal * n(a.mg) / 100 + fromL.mg) / total * 100 : 0;
  return { total, water, waterAbs, dryWeight, mn, nh3n, mg, fromL };
  });
}

function calcD() {
  return cached('D', () => {
  const c = calcResults['C'] || notCalculated();
  const dp = nodeById('D').params || { slagWater: 500 };
  const stayWaterSet = n(dp.slagWater);             // 渣饼含水，kg
  const dryWeight = n(c.dryWeight);                 // 干渣全部进入 D
  const cWater = n(c.waterAbs);
  const cTotal = n(c.total);
  const stayWater = Math.min(cWater, stayWaterSet); // 实际去一洗涤的渣饼水
  const toL = Math.max(0, cWater - stayWater);      // 多余去中转桶的水
  const outTotal = dryWeight + cWater;                // D 实际进入总量
  // 元素溶解在水中，按 C 总水量比例分配
  const stayRatio = cWater > 0 ? stayWater / cWater : 0;
  const toLRatio  = cWater > 0 ? toL / cWater : 0;
  const inMn   = cTotal * n(c.mn) / 100;
  const inNh3n = cTotal * n(c.nh3n) / 100;
  const inMg   = cTotal * n(c.mg) / 100;
  return {
    total: outTotal,
    dryWeight,
    waterAbs: cWater,
    water: outTotal > 0 ? cWater / outTotal * 100 : 0,
    mn: outTotal > 0 ? inMn / outTotal * 100 : 0,
    nh3n: outTotal > 0 ? inNh3n / outTotal * 100 : 0,
    mg: outTotal > 0 ? inMg / outTotal * 100 : 0,
    toL: toL,
    stayWater,
    stayRatio,
    stayMn: inMn * stayRatio,
    stayNh3n: inNh3n * stayRatio,
    stayMg: inMg * stayRatio,
    toLMn: inMn * toLRatio,
    toLNh3n: inNh3n * toLRatio,
    toLMg: inMg * toLRatio,
    raw: c
  };
  });
}

function calcE() {
  return cached('E', () => {
  const d = calcResults['D'] || notCalculated();
  const ep = nodeById('E').params || { washEff: 85, washSlagWater: 333.33 };
  const r = nodeById('R').params || { total: 0, water: 0, mn: 0, nh3n: 0, mg: 0, toLZ2: 0 };
  const eff = n(ep.washEff) / 100;
  const washSlagWater = n(ep.washSlagWater) || 333.33; // 洗涤后渣饼含水 kg

  // R 回水（先取固定 500 kg 回一洗涤，多余去 LZ2）
  const rTotal = n(r.total);
  const rWater = Math.min(500, rTotal); // 回一洗涤的水量 kg
  const rToLZ2 = Math.max(0, rTotal - rWater); // 多余去 LZ2
  const rRatio = rTotal > 0 ? rWater / rTotal : 0;
  const rMn    = rTotal * n(r.mn) / 100 * rRatio;
  const rNh3n  = rTotal * n(r.nh3n) / 100 * rRatio;
  const rMg    = rTotal * n(r.mg) / 100 * rRatio;
  const rToLZ2Mn    = rTotal * n(r.mn) / 100 - rMn;
  const rToLZ2Nh3n  = rTotal * n(r.nh3n) / 100 - rNh3n;
  const rToLZ2Mg    = rTotal * n(r.mg) / 100 - rMg;

  const dDry = n(d.dryWeight);
  const dWater = n(d.stayWater);                    // D 渣饼水 kg
  const stayDry = dDry;                             // 干渣全部留下 kg
  const inWater = dWater + rWater;                  // 一洗涤体系总进水 kg
  const stayWater = washSlagWater;                  // 洗涤后渣饼保留水 kg
  const toLWater = Math.max(0, inWater - stayWater); // 去中转桶/出压榨水 kg
  const stayTotal = stayDry + stayWater;             // kg

  // 元素总量 = D 渣饼溶质 + R 回水元素，kg
  const inMn   = n(d.stayMn) + rMn;
  const inNh3n = n(d.stayNh3n) + rNh3n;
  const inMg   = n(d.stayMg) + rMg;

  // 洗涤效率仅作用于渣饼原有溶质；回水溶质进入渣饼，不重复洗出
  const toLMn   = n(d.stayMn) * eff;
  const toLNh3n = n(d.stayNh3n) * eff;
  const toLMg   = n(d.stayMg) * eff;
  const stayMn   = n(d.stayMn) * (1 - eff) + rMn;
  const stayNh3n = n(d.stayNh3n) * (1 - eff) + rNh3n;
  const stayMg   = n(d.stayMg) * (1 - eff) + rMg;

  return {
    eff,
    stayDry,
    stayWater,
    stayTotal,
    toLTotal: toLWater,
    water: stayTotal > 0 ? stayWater / stayTotal * 100 : 0,
    mn: stayTotal > 0 ? stayMn / stayTotal * 100 : 0,
    nh3n: stayTotal > 0 ? stayNh3n / stayTotal * 100 : 0,
    mg: stayTotal > 0 ? stayMg / stayTotal * 100 : 0,
    toL: {
      water: toLWater,
      mn: toLWater > 0 ? toLMn / toLWater * 100 : 0,
      nh3n: toLWater > 0 ? toLNh3n / toLWater * 100 : 0,
      mg: toLWater > 0 ? toLMg / toLWater * 100 : 0
    },
    rToLZ2, rToLZ2Mn, rToLZ2Nh3n, rToLZ2Mg
  };
  });
}

function calcF() {
  return cached('F', () => {
  const e = calcResults['E'] || notCalculated();
  const eDry = n(e.stayDry);
  const eWater = n(e.stayWater);
  const eTotal = n(e.stayTotal);
  const stayTotal = eDry + eWater;
  // F 直接承接一洗涤后的渣饼；洗涤去中转水已在 E 计算
  return {
    total: stayTotal,
    dryWeight: eDry,
    waterAbs: eWater,
    toL: 0,
    toLWater: { water: 0, mn: 0, nh3n: 0, mg: 0 },
    water: stayTotal > 0 ? eWater / stayTotal * 100 : 0,
    mn: e.mn,
    nh3n: e.nh3n,
    mg: e.mg
  };
  });
}

function calcM() {
  return cached('M', () => {
  const h = calcResults['H'] || notCalculated();
  const r = calcResults['R'] || notCalculated();
  const mp = nodeById('M').params || { blowRate: 20, outNh3n: 0 };
  // LZ2 接收 H 去吹脱水 + XZ2 多余来水
  const mWater = n(h.toL) + n(r.toLZ2);
  const mTotal = mWater;
  if (mTotal <= 0) return { total: 0, waterAbs: 0, water: 0, mn: 0, nh3n: 0, mg: 0 };
  const mn   = (n(h.toLMn)   + n(r.toLZ2Mn))   / mWater * 100;
  let nh3n = (n(h.toLNh3n) + n(r.toLZ2Nh3n)) / mWater * 100;
  const mg   = (n(h.toLMg)   + n(r.toLZ2Mg))   / mWater * 100;
  // 吹脱氨氮
  const blowRate = Number(mp.blowRate) / 100;
  const outNh3n = Number(mp.outNh3n);
  if (blowRate > 0) {
    nh3n = nh3n * (1 - blowRate);
  } else if (outNh3n > 0) {
    nh3n = Math.min(nh3n, outNh3n / 10000);
  }
  return { total: mTotal, waterAbs: mWater, water: 100, mn, nh3n, mg };
  });
}

function calcT() {
  return cached('T', () => {
  const m = calcResults['M'] || notCalculated();
  const tp = nodeById('T').params || { mgRemoval: 20 };
  const mgRemoval = Number(tp.mgRemoval) / 100;
  // 沉淀：水不变，镁按去除比例减少
  const inWater = n(m.waterAbs);
  const inMn = inWater * n(m.mn) / 100;
  const inNh3n = inWater * n(m.nh3n) / 100;
  const inMg = inWater * n(m.mg) / 100;
  const outMg = inMg * (1 - mgRemoval);
  return {
    total: inWater,
    waterAbs: inWater,
    water: 100,
    mn: inWater > 0 ? inMn / inWater * 100 : 0,
    nh3n: inWater > 0 ? inNh3n / inWater * 100 : 0,
    mg: inWater > 0 ? outMg / inWater * 100 : 0
  };
  });
}

function calcG() {
  return cached('G', () => {
  const f = calcResults['F'] || notCalculated();
  const t = calcResults['T'] || notCalculated();
  const gp = nodeById('G').params || { slagWaterRatio: 3 };
  const dryWeight = n(f.dryWeight);
  const fTotal = n(f.total), tTotal = n(t.total);
  const fMn = fTotal * n(f.mn) / 100, fNh3n = fTotal * n(f.nh3n) / 100, fMg = fTotal * n(f.mg) / 100;
  const tMn = tTotal * n(t.mn) / 100, tNh3n = tTotal * n(t.nh3n) / 100, tMg = tTotal * n(t.mg) / 100;
  const ratio = Number(gp.slagWaterRatio) || 3;
  const targetWater = dryWeight * ratio;
  const inWater = n(f.waterAbs) + n(t.waterAbs);
  // 无害化化浆：F 渣饼水 + T 回水，不足时补水到目标渣水比
  const makeup = Math.max(0, targetWater - inWater);
  const waterAbs = inWater + makeup;
  const total = dryWeight + waterAbs;
  const inMn = fMn + tMn, inNh3n = fNh3n + tNh3n, inMg = fMg + tMg;
  if (total <= 0) return { total: 0, dryWeight: 0, waterAbs: 0, toL: 0, makeup: 0, water: 0, mn: 0, nh3n: 0, mg: 0 };
  return {
    total,
    dryWeight,
    waterAbs,
    toL: 0,
    makeup,
    water: waterAbs / total * 100,
    mn: inMn / total * 100,
    nh3n: inNh3n / total * 100,
    mg: inMg / total * 100
  };
  });
}

function calcH() {
  return cached('H', () => {
  const g = calcResults['G'] || notCalculated();
  const hp = nodeById('H').params || { slagWater: 500 };
  const stayWaterSet = n(hp.slagWater);          // 渣饼含水，kg
  const dryWeight = n(g.dryWeight);
  const gWater = n(g.waterAbs);
  const gTotal = n(g.total);
  const stayWater = Math.min(gWater, stayWaterSet); // 实际去二洗涤的渣饼水
  const toL = Math.max(0, gWater - stayWater);    // 多余去吹脱的水
  const outTotal = dryWeight + gWater;              // H 实际进入总量
  const stayRatio = gWater > 0 ? stayWater / gWater : 0;
  const toLRatio  = gWater > 0 ? toL / gWater : 0;
  const inMn   = gTotal * n(g.mn) / 100;
  const inNh3n = gTotal * n(g.nh3n) / 100;
  const inMg   = gTotal * n(g.mg) / 100;
  return {
    total: outTotal,
    dryWeight,
    waterAbs: gWater,
    toL,
    water: outTotal > 0 ? gWater / outTotal * 100 : 0,
    mn: outTotal > 0 ? inMn / outTotal * 100 : 0,
    nh3n: outTotal > 0 ? inNh3n / outTotal * 100 : 0,
    mg: outTotal > 0 ? inMg / outTotal * 100 : 0,
    stayWater,
    stayRatio,
    stayMn: inMn * stayRatio,
    stayNh3n: inNh3n * stayRatio,
    stayMg: inMg * stayRatio,
    toLMn: inMn * toLRatio,
    toLNh3n: inNh3n * toLRatio,
    toLMg: inMg * toLRatio
  };
  });
}

function calcL() {
  return cached('L', () => {
  const d = calcResults['D'] || notCalculated();
  const e = calcResults['E'] || notCalculated();
  const r = calcResults['R'] || notCalculated();
  const lp = nodeById('L').params || { toN: 500 };
  const dToL = n(d.toL);
  const eToLWater = n(e.toL && e.toL.water);
  const rToLZ2 = n(r.toLZ2); // XZ2 多余去 LZ2/M 的水量，先并入 LZ1 再统一分配
  const inWater = dToL + eToLWater + rToLZ2;
  const toN = n(lp.toN);                        // 去蒸氨/沉锰的水量
  const backToCWater = Math.max(0, inWater - toN);
  let mn = 0, nh3n = 0, mg = 0;
  if (inWater > 0) {
    const dMnMass = n(d.toLMn), dNh3nMass = n(d.toLNh3n), dMgMass = n(d.toLMg);
    const eMnMass = eToLWater * n(e.toL && e.toL.mn) / 100;
    const eNh3nMass = eToLWater * n(e.toL && e.toL.nh3n) / 100;
    const eMgMass = eToLWater * n(e.toL && e.toL.mg) / 100;
    mn = (dMnMass + eMnMass + n(r.toLZ2Mn)) / inWater * 100;
    nh3n = (dNh3nMass + eNh3nMass + n(r.toLZ2Nh3n)) / inWater * 100;
    mg = (dMgMass + eMgMass + n(r.toLZ2Mg)) / inWater * 100;
  }
  return {
    total: inWater,
    water: 100,
    waterAbs: inWater,
    mn, nh3n, mg, toN,
    backToC: { water: backToCWater, mn: n(mn) * backToCWater / 100, nh3n: n(nh3n) * backToCWater / 100, mg: n(mg) * backToCWater / 100 }
  };
  });
}

function calcP() {
  return cached('P', () => {
  const o = calcResults['O'] || notCalculated();
  const pp = nodeById('P').params || { outNh3n: 50 };
  const inWater = n(o.waterAbs);
  const inMn   = inWater * n(o.mn) / 100;
  const inNh3n = inWater * n(o.nh3n) / 100;
  const inMg   = inWater * n(o.mg) / 100;
  // 蒸氨后氨氮、锰、镁均按目标出水浓度 50 mg/L 控制（与表格 ZA 蒸氨后 M≈0.025 kg 对应）
  const outTarget = n(pp.outNh3n) / 10000; // mg/L → 水中质量百分数
  const outNh3nKg = Math.min(inNh3n, inWater * outTarget / 100);
  const outMnKg   = Math.min(inMn,   inWater * outTarget / 100);
  const outMgKg   = Math.min(inMg,   inWater * outTarget / 100);
  const outWater = inWater;
  const outTotal = outWater;
  return {
    total: outTotal,
    waterAbs: outWater,
    water: 100,
    mn: outTotal > 0 ? outMnKg / outTotal * 100 : 0,
    nh3n: outTotal > 0 ? outNh3nKg / outTotal * 100 : 0,
    mg: outTotal > 0 ? outMgKg / outTotal * 100 : 0
  };
  });
}

function calcI() {
  return cached('I', () => {
  const h = calcResults['H'] || notCalculated();
  const q = calcResults['Q'] || notCalculated();
  const ip = nodeById('I').params || { washEff: 85, washSlagWater: 333.33 };
  const eff = n(ip.washEff) / 100;
  const washSlagWater = n(ip.washSlagWater) || 333.33; // 二洗涤后渣饼含水 kg

  const qWater = n(q.waterAbs);                       // 中和回水 kg
  const qMn    = n(q.total) * n(q.mn) / 100;
  const qNh3n  = n(q.total) * n(q.nh3n) / 100;
  const qMg    = n(q.total) * n(q.mg) / 100;

  const stayDry = n(h.dryWeight);                     // 干渣全部留下 kg
  const hWater = n(h.stayWater);                      // H 渣饼水 kg
  const hMn    = n(h.stayMn), hNh3n = n(h.stayNh3n), hMg = n(h.stayMg);
  const inWater = hWater + qWater;                    // 二洗涤体系总进水 kg
  const stayWater = washSlagWater;                    // 洗涤后渣饼保留水 kg
  const toLWater = Math.max(0, inWater - stayWater);  // 去洗涤中转 kg
  const stayTotal = stayDry + stayWater;              // kg

  // 元素总量
  const inMn   = hMn + qMn;
  const inNh3n = hNh3n + qNh3n;
  const inMg   = hMg + qMg;

  // 洗涤效率仅作用于渣饼原有溶质；回水溶质进入渣饼，不重复洗出
  const toLMn   = hMn * eff;
  const toLNh3n = hNh3n * eff;
  const toLMg   = hMg * eff;
  const stayMn   = hMn * (1 - eff) + qMn;
  const stayNh3n = hNh3n * (1 - eff) + qNh3n;
  const stayMg   = hMg * (1 - eff) + qMg;

  return {
    eff,
    stayDry,
    stayWater,
    stayTotal,
    toLTotal: toLWater,
    water: stayTotal > 0 ? stayWater / stayTotal * 100 : 0,
    mn: stayTotal > 0 ? stayMn / stayTotal * 100 : 0,
    nh3n: stayTotal > 0 ? stayNh3n / stayTotal * 100 : 0,
    mg: stayTotal > 0 ? stayMg / stayTotal * 100 : 0,
    toL: {
      water: toLWater,
      mn: toLWater > 0 ? toLMn / toLWater * 100 : 0,
      nh3n: toLWater > 0 ? toLNh3n / toLWater * 100 : 0,
      mg: toLWater > 0 ? toLMg / toLWater * 100 : 0
    }
  };
  });
}

function calcR() {
  const i = calcResults['I'] || notCalculated();
  const toL = i.toL || { water: 0, mn: 0, nh3n: 0, mg: 0 };
  const total = n(toL.water);
  // XZ2 中转桶：固定 500 kg 回一洗涤 E，多余去 LZ2/M
  const backToE = Math.min(500, total);
  const toLZ2 = Math.max(0, total - backToE);
  const ratioE = total > 0 ? backToE / total : 0;
  const ratioLZ2 = total > 0 ? toLZ2 / total : 0;
  return {
    total,
    water: total > 0 ? 100 : 0,
    mn: n(toL.mn),
    nh3n: n(toL.nh3n),
    mg: n(toL.mg),
    backToE,
    backToEMn: n(toL.mn) * ratioE,
    backToENh3n: n(toL.nh3n) * ratioE,
    backToEMg: n(toL.mg) * ratioE,
    toLZ2,
    toLZ2Mn: n(toL.mn) * ratioLZ2,
    toLZ2Nh3n: n(toL.nh3n) * ratioLZ2,
    toLZ2Mg: n(toL.mg) * ratioLZ2
  };
}

function updateR() {
  const r = calcR();
  const rn = nodeById('R');
  rn.params = {
    total: n(r.total),
    water: n(r.water),
    mn: n(r.mn),
    nh3n: n(r.nh3n),
    mg: n(r.mg),
    backToE: n(r.backToE),
    backToEMn: n(r.backToEMn),
    backToENh3n: n(r.backToENh3n),
    backToEMg: n(r.backToEMg),
    toLZ2: n(r.toLZ2),
    toLZ2Mn: n(r.toLZ2Mn),
    toLZ2Nh3n: n(r.toLZ2Nh3n),
    toLZ2Mg: n(r.toLZ2Mg)
  };
}

function calcJ() {
  return cached('J', () => {
  const i = calcResults['I'] || notCalculated();
  const iDry = n(i.stayDry);
  const iWater = n(i.stayWater);
  const stayTotal = iDry + iWater;
  // J 直接承接二洗涤后的渣饼；洗涤去中转水已在 I 计算
  return {
    total: stayTotal,
    dryWeight: iDry,
    waterAbs: iWater,
    toL: 0,
    toLWater: { water: 0, mn: 0, nh3n: 0, mg: 0 },
    water: stayTotal > 0 ? iWater / stayTotal * 100 : 0,
    mn: i.mn,
    nh3n: i.nh3n,
    mg: i.mg
  };
  });
}

function saveParams(nodeId) {
  const n = nodeById(nodeId);
  if (nodeId === 'A') {
    n.params = {
      total: document.getElementById('p-total').value,
      water: document.getElementById('p-water').value,
      mn: document.getElementById('p-mn').value,
      nh3n: document.getElementById('p-nh3n').value,
      mg: document.getElementById('p-mg').value
    };
  } else if (nodeId === 'C' || nodeId === 'G') {
    n.params = { slagWaterRatio: document.getElementById('p-slagWaterRatio').value };
  } else if (nodeId === 'L') {
    n.params = { toN: document.getElementById('p-toN').value };
  } else if (nodeId === 'N') {
    n.params = { outMn: document.getElementById('p-outMn').value };
  } else if (nodeId === 'O') {
    n.params = { ph: document.getElementById('p-ph').value };
  } else if (nodeId === 'P') {
    n.params = { outNh3n: document.getElementById('p-outNh3n').value };
  } else if (nodeId === 'Q') {
    n.params = { ph: document.getElementById('p-ph').value };
  } else if (nodeId === 'T') {
    n.params = { mgRemoval: document.getElementById('p-mgRemoval').value };
  } else if (nodeId === 'M') {
    n.params = {
      blowRate: document.getElementById('p-blowRate').value,
      outNh3n: document.getElementById('p-blowOutNh3n').value
    };
  } else if (nodeId === 'D' || nodeId === 'H') {
    n.params = { slagWater: Number(document.getElementById('p-slagWater').value) };
  } else if (nodeId === 'E' || nodeId === 'I') {
    n.params = { washEff: Number(document.getElementById('p-washEff').value), washSlagWater: Number(document.getElementById('p-washSlagWater').value) };
  } else if (nodeId === 'F' || nodeId === 'J') {
    n.params = { outSlagWater: document.getElementById('p-outSlagWater').value };
  }
  const btn = document.querySelector('.save-btn');
  if (btn) { btn.textContent = '已保存'; setTimeout(() => btn.textContent = '保存参数', 1200); }
}

function resetView() { resize(); }
function toggleLabels() { showLabels = !showLabels; draw(); }
function toggleFlow() {
  flowEnabled = !flowEnabled;
  document.getElementById('flowBtn').textContent = flowEnabled ? '暂停流动' : '开始流动';
  if (flowEnabled) draw();
}

function runCalc(maxRounds = 20) {
  let status = document.getElementById('calcStatus');
  if (!status) {
    status = document.createElement('div');
    status.id = 'calcStatus';
    status.className = 'calc-status';
    status.style.display = 'none';
    document.getElementById('propPanel').prepend(status);
  }
  status.style.display = 'block';
  // 所有需要参数的节点都补默认值，避免 undefined 导致计算为 0/NaN
  const defaults = {
    A: { total: 1333.33, water: 25, mn: 1, nh3n: 0.5, mg: 1.05 },
    C: { slagWaterRatio: 3 },
    D: { slagWater: 500 },
    E: { washEff: 85 },
    F: { outSlagWater: 25 },
    G: { slagWaterRatio: 3 },
    H: { slagWater: 500 },
    I: { washEff: 85, washSlagWater: 333.33 },
    J: { outSlagWater: 25 },
    L: { toN: 500, backToC: { water: 0, mn: 0, nh3n: 0, mg: 0 } },
    M: { blowRate: 20, outNh3n: 0 },
    N: { outMn: 200 },
    O: { ph: 12 },
    P: { outNh3n: 50 },
    Q: { ph: 8 },
    T: { mgRemoval: 20 }
  };
  Object.entries(defaults).forEach(([id, def]) => {
    const nd = nodeById(id);
    if (!nd.params) nd.params = {};
    Object.entries(def).forEach(([k, v]) => { if (nd.params[k] == null || nd.params[k] === '') nd.params[k] = v; });
  });
  let round = 0;
  function step() {
    clearCalcCache();
    round++;
    lastCalcRound = round;
      // 保留上一轮 calcResults（T/G 等循环依赖需要），再依次覆盖更新
      const prev = calcResults;
      calcResults = { A: nodeById('A').params };
      Object.assign(calcResults, prev);
      calcResults.C = calcC();
      calcResults.D = calcD();
      calcResults.E = calcE();
      calcResults.F = calcF();
      calcResults.G = calcG();
      calcResults.H = calcH();
      calcResults.L = calcL();
      calcResults.N = calcN();
      calcResults.O = calcO();
      calcResults.P = calcP();
      calcResults.Q = calcQ();
      calcResults.I = calcI();
      calcResults.J = calcJ();
      calcResults.K = calcJ();
      calcResults.M = calcM();
      calcResults.R = calcR();
      calcResults.S = { mnKg: 0 };
      calcResults.T = calcT();
    updateR();        // 用本轮 I 更新 R，供下一轮 E 使用
    updateL();        // 用本轮 L 更新回水，供下一轮 C 使用
    status.textContent = '计算中... 迭代次数：' + round;
    if (round < maxRounds) {
      setTimeout(step, 30);
    } else {
      status.textContent = '计算结束，共迭代 ' + round + ' 次';
    }
  }
  step();
}


window.addEventListener('resize', resize);
window.addEventListener('load', () => { resize(); animate(); });
</script>
